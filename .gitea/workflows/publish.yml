name: publish

on:
  push:
    tags:
      - "*-*.*.*-*"

jobs:
  publish:
    runs-on: native
    env:
      # NAS act_runner runs under adminadmin; Entware tools live in /opt/bin
      # and luarocks is at $HOME/.local/bin (built per SHI-176 Phase 4 D.2).
      PATH: /share/homes/adminadmin/.local/bin:/opt/bin:/opt/sbin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Tag-format guard
        id: parse
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-}"
          if [[ -z "$TAG" ]]; then
            echo "ERROR: no GITHUB_REF_NAME present (expected on tag push)" >&2
            exit 1
          fi
          if ! [[ "$TAG" =~ ^([a-z_]+)-([0-9]+\.[0-9]+\.[0-9]+-[0-9]+)$ ]]; then
            echo "ERROR: tag '$TAG' does not match <module>-<MAJOR>.<MINOR>.<PATCH>-<rockrev>" >&2
            exit 1
          fi
          MODULE="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"
          echo "module=$MODULE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Parsed: module=$MODULE version=$VERSION"

      - name: Checkout cook-modules at the tag
        env:
          # Auto-provided by Gitea per job; scoped to the running repo.
          JOB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Plain git clone â€” actions/checkout would need node on the runner.
          # Gitea exposes the job token via github.token; embed as basic auth.
          # ${GITHUB_SERVER_URL} â†’ e.g. http://gilberthouse.story-pike.ts.net:3000
          AUTHED_URL="${GITHUB_SERVER_URL%/}"
          AUTHED_URL="${AUTHED_URL/http:\/\//http://x-access-token:${JOB_TOKEN}@}"
          AUTHED_URL="${AUTHED_URL/https:\/\//https://x-access-token:${JOB_TOKEN}@}"
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" \
              "${AUTHED_URL}/${GITHUB_REPOSITORY}.git" cook-modules 2>&1 \
              | sed "s|${JOB_TOKEN}|***|g"
          ls -la cook-modules/

      - name: Pack the rock
        working-directory: cook-modules/${{ steps.parse.outputs.module }}
        run: |
          set -euo pipefail
          MODULE="${{ steps.parse.outputs.module }}"
          VERSION="${{ steps.parse.outputs.version }}"
          luarocks pack "${MODULE}-${VERSION}.rockspec"
          ls -la "${MODULE}-${VERSION}.src.rock"

      - name: Checkout cook-rocks-index
        env:
          INDEX_TOKEN: ${{ secrets.ROCKS_INDEX_TOKEN }}
        run: |
          set -euo pipefail
          # Use the Gitea index token as basic-auth password.
          # ${GITHUB_SERVER_URL} â†’ e.g. http://gilberthouse.story-pike.ts.net:3000
          AUTHED_URL="${GITHUB_SERVER_URL%/}"
          AUTHED_URL="${AUTHED_URL/http:\/\//http://x-access-token:${INDEX_TOKEN}@}"
          AUTHED_URL="${AUTHED_URL/https:\/\//https://x-access-token:${INDEX_TOKEN}@}"
          git clone "${AUTHED_URL}/alex/cook-rocks-index.git" cook-rocks-index 2>&1 \
              | sed "s|${INDEX_TOKEN}|***|g"
          ls -la cook-rocks-index/ | head

      - name: Stage artifacts + regenerate manifest
        working-directory: cook-rocks-index
        run: |
          set -euo pipefail
          MODULE="${{ steps.parse.outputs.module }}"
          VERSION="${{ steps.parse.outputs.version }}"
          cp "../cook-modules/${MODULE}/${MODULE}-${VERSION}.rockspec" .
          cp "../cook-modules/${MODULE}/${MODULE}-${VERSION}.src.rock" .
          luarocks-admin make-manifest .
          ls -la "${MODULE}-${VERSION}".*

      - name: Commit and push to Gitea (idempotent)
        working-directory: cook-rocks-index
        run: |
          set -euo pipefail
          MODULE="${{ steps.parse.outputs.module }}"
          VERSION="${{ steps.parse.outputs.version }}"
          git config user.email "ci@lioralabs.dev"
          git config user.name "cook-modules CI"
          git add manifest manifest-5.* "${MODULE}-${VERSION}".rockspec "${MODULE}-${VERSION}".src.rock
          if git diff --quiet --staged; then
            echo "No changes to commit (idempotent re-run)"
          else
            git commit -m "publish: ${MODULE}-${VERSION}"
            git push origin main
          fi

      - name: Force-push to GitHub mirror (Cloudflare Pages source)
        working-directory: cook-rocks-index
        env:
          MIRROR_TOKEN: ${{ secrets.ROCKS_MIRROR_TOKEN }}
        run: |
          set -euo pipefail
          git remote remove github 2>/dev/null || true
          git remote add github "https://x-access-token:${MIRROR_TOKEN}@github.com/lioralabs/cook-rocks-index.git"
          git push --force github main 2>&1 | sed "s|${MIRROR_TOKEN}|***|g"
